<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Social - Simulation Pro (Moteur Français Complet)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y;
        }
        .live-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            max-width: 1400px;
            margin: 0 auto;
            background: #000;
            position: relative;
        }
        .video-area {
            position: relative;
            background: #111;
            flex: 2;
            min-height: 48vh;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        #liveVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a1a;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 2;
        }
        .live-badge {
            background: #ff3b30;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }
        .live-badge i {
            font-size: 10px;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .stats-header {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            pointer-events: auto;
        }
        .stats-header span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .camera-switch-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 12px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            pointer-events: auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        
        .interaction-area {
            background: #0f0f0f;
            flex: 1.2;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #2a2a2a;
            position: relative;
        }
        .reaction-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #161616;
            border-bottom: 1px solid #2c2c2c;
        }
        .like-count {
            background: #1e1e2f;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .like-count i { color: #ff2d55; }
        
        .btn-like {
            background: linear-gradient(135deg, #ff2d55, #ff4757);
            border: none;
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
            background: #0a0a0a;
        }
        .message-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(26, 26, 36, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 14px;
            padding: 8px 12px;
            max-width: 95%;
            font-size: 0.85rem;
            animation: fadeSlideUp 0.22s cubic-bezier(0.1, 0.8, 0.2, 1);
            word-break: break-word;
            border-left: 3px solid #3a3a4a;
        }
        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            color: white;
            flex-shrink: 0;
            text-transform: uppercase;
        }
        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .username-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
        }
        .badge-verified {
            color: #3897f0;
            font-size: 0.75rem;
        }
        .msg-text {
            color: #efefef;
            line-height: 1.3;
        }
        
        .join-message {
            background: transparent;
            border-left: none;
            padding: 2px 12px;
            font-style: italic;
            color: #8e8e93;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .join-message i { font-size: 0.7rem; color: #34c759; }

        .my-message {
            background: rgba(42, 157, 143, 0.15);
            align-self: flex-end;
            border-left-color: #2a9d8f;
        }
        
        .chat-input-area {
            display: flex;
            padding: 10px 14px;
            background: #121212;
            gap: 10px;
            border-top: 1px solid #2a2a2a;
        }
        .chat-input-area input {
            flex: 1;
            background: #202020;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .chat-input-area button {
            background: #ff3b30;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .heart-stream-container {
            position: absolute;
            right: 20px;
            bottom: 60px;
            width: 100px;
            height: 320px;
            pointer-events: none;
            z-index: 99;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            bottom: 0;
            right: 25px;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            animation: floatUpStream 2.2s cubic-bezier(0.08, 0.74, 0.31, 1) forwards;
        }
        @keyframes floatUpStream {
            0% { opacity: 0; transform: bottom 0px scale(0.5) translateX(0); }
            12% { opacity: 0.95; transform: scale(1.1); }
            85% { opacity: 0.8; }
            100% { opacity: 0; bottom: 280px; transform: scale(1.4) translateX(var(--x-end)); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0d11;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 20px;
            transition: opacity 0.4s ease;
        }
        .start-btn {
            background: linear-gradient(135deg, #ff3b30, #ff453a);
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
        }
    </style>
</head>
<body>

<div class="start-overlay" id="appStartOverlay">
    <h2>Simulation Live Intégrale (FR)</h2>
    <button class="start-btn" id="explicitStartBtn">Lancer le direct</button>
</div>

<div class="live-container">
    <div class="video-area">
        <video id="liveVideo" autoplay playsinline muted></video>
        <div class="video-overlay">
            <div class="live-badge"><i class="fas fa-circle"></i> EN DIRECT</div>
            <div class="stats-header">
                <span><i class="fas fa-eye"></i> <span id="viewerCount">142</span></span>
                <span><i class="fas fa-heart"></i> <span id="likeCountDisplay">254</span></span>
            </div>
        </div>
        <button id="switchCameraBtn" class="camera-switch-btn"><i class="fas fa-camera"></i></button>
    </div>

    <div class="interaction-area">
        <div class="heart-stream-container" id="heartStream"></div>

        <div class="reaction-toolbar">
            <div class="like-count">
                <i class="fas fa-heart"></i> <span id="totalLikesRealtime">254</span>
            </div>
            <button id="sendLikeBtn" class="btn-like"><i class="fas fa-heart"></i></button>
        </div>

        <div class="chat-window" id="chatMessages"></div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ajouter un commentaire..." autocomplete="off">
            <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    (function() {
        // Injection complète et rigoureuse de vos catalogues de contenu FR
        const commentsDb = {
            common: ["Salut le live","Ça rend bien","On est là","Bonne énergie","La qualité est propre","Continue comme ça","Très naturel","Je reste regarder","Ça commence bien","Premier live que je vois de toi","Je viens d'arriver, je rattrape","Bonne ambiance ce soir","Ça donne envie de rester","Belle énergie aujourd'hui","Tu gères bien","Le son est clair","On capte bien tout","Bonne soirée à toi","Je suis fan de ce format","C'est cool de te voir live","Tranquille ce live","Petit coucou en passant","Je découvre, je reste un peu","C'est apaisant à regarder","Ravi de tomber sur ce live","Toujours sympa de passer ici"],
            hype: ["Incroyable","Trop fort","Let's go","Le live est propre","Grosse ambiance","Ça monte fort","On défonce tout ce soir","Ça part fort","Énorme","C'est de la balle","Ambiance de feu","Ça chauffe","Vous gérez tous","Le pic est énorme","C'est parti","On y croit à fond","Belle montée","Ça envoie","Niveau maximum","C'est le feu","C'est dingue cette ambiance"],
            offtopic_life: ["Vive le PSG","Quelqu'un a vu le nouveau Pokémon ?","J'adore les pâtes carbonara","Mon chat vient de renverser mon café","Il pleut chez moi","Je mange une pizza en regardant","Allez l'OM","J'ai trop la dalle là","Mon voisin fait encore du bruit","Le café est meilleur que le thé","Je révise pendant que je regarde","Vivement le week-end","Mon téléphone est à 1% là","Je suis sous ma couette, trop bien","Mon Wifi rame un peu"],
            questions: ["Tu fais ça depuis combien de temps ?","Tu peux montrer la config ?","C'est quoi ton setup ?","Tu réponds aux questions ?","Tu vas live combien de temps ?","Tu fais ça tous les jours ?","C'est quoi le programme aujourd'hui ?","Tu es où exactement ?","Tu utilises quel logiciel ?","Tu lis tous les messages ?","Tu utilises quel micro ?","Tu as un planning de lives ?"],
            slang: ["Wesh ça va ou quoi","C'est clean frérot","J'suis mort de rire","Askip c'est la hype","Ça part en couille là","T'es chaud toi","Ratio","Clip ça vite","Sah c'est bien","Grave","C'est ouf","Tu gères grave","C'est validé","J'avoue c'est propre","Tranquille tranquille","C'est chill","Mood","Big up","Ça fait plaiz","T'assures","C'est lourd"],
            troll_light: ["On dirait un vrai live haha","Le cadrage est serré non ?","Je bug ou ça lag un peu ?","Qui a invité le bot ?","Le cadrage est chelou là","Ok mais pourquoi personne dit rien","Je crois que ton chat a buggé","C'est moi ou ça fige un peu ?","Tout le monde dort ou quoi","C'est calme calme calme"]
        };

        const prefixList = ["Alex", "Sara", "Tom", "Léna", "Max", "Lili", "Hugo", "Chloé", "Nico", "Emma"];
        const rootList = ["_Gamer", "Vibes", "📸", "prod", "_off", ".xyz", "Design", "Fnx"];
        const avatarColors = ["#ff2d55", "#4cd964", "#5856d6", "#ff9500", "#ffcc00", "#5ac8fa", "#007aff", "#e056fd", "#2a9d8f"];

        const video = document.getElementById('liveVideo');
        const chatDiv = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const viewerSpan = document.getElementById('viewerCount');
        const likeDisplaySpan = document.getElementById('likeCountDisplay');
        const totalLikesSpan = document.getElementById('totalLikesRealtime');
        
        let totalLikes = 254, viewerCount = 142, currentStream = null, currentFacing = 'user';

        function generateUniqueUsername() {
            const p = prefixList[Math.floor(Math.random() * prefixList.length)];
            const r = rootList[Math.floor(Math.random() * rootList.length)];
            const num = Math.random() > 0.4 ? Math.floor(Math.random() * 98 + 2) : "";
            return `${p}${r}${num}`;
        }

        function appendMessage(username, text, type) {
            if (type === 'join') {
                const joinDiv = document.createElement('div');
                joinDiv.className = 'join-message';
                joinDiv.innerHTML = `<i class="fas fa-user-plus"></i> <span><strong>${username}</strong> a rejoint</span>`;
                chatDiv.appendChild(joinDiv);
            } else {
                const msgItem = document.createElement('div');
                msgItem.className = `message-item ${type === 'my' ? 'my-message' : ''}`;
                
                // Association des couleurs de bordure conformes à votre architecture Flutter
                let borderColor = '#ffffff';
                if (type === 'question') borderColor = '#ffb300';
                else if (type === 'hype') borderColor = '#ff2d55';
                else if (type === 'slang' || type === 'troll_light') borderColor = '#ff9500';

                msgItem.style.borderLeftColor = borderColor;
                
                const initials = username.substring(0, 2);
                const color = avatarColors[Math.floor(Math.random() * avatarColors.length)];
                const isVerified = Math.random() < 0.15;

                msgItem.innerHTML = `
                    <div class="avatar" style="background:${color}">${initials}</div>
                    <div class="msg-content">
                        <span class="username-wrapper" style="color:${color}">${username} ${isVerified ? '<i class="fas fa-check-circle badge-verified"></i>' : ''}</span>
                        <span class="msg-text">${text}</span>
                    </div>
                `;
                chatDiv.appendChild(msgItem);
            }
            chatDiv.scrollTop = chatDiv.scrollHeight;
            while (chatDiv.children.length > 40) chatDiv.removeChild(chatDiv.firstChild);
        }

        function triggerFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            const randomXEnd = Math.floor(Math.random() * 60) - 30;
            heart.style.color = ['#ff2d55', '#ff4757', '#e056fd', '#ff9f4a'][Math.floor(Math.random() * 4)];
            heart.style.setProperty('--x-end', `${randomXEnd}px`);
            heart.innerHTML = '<i class="fas fa-heart"></i>';
            document.getElementById('heartStream').appendChild(heart);
            setTimeout(() => heart.remove(), 2200);
        }

        // Moteur de distribution rigoureux basé sur votre matrice de probabilités
        function runSimulationTick() {
            const dice = Math.random();
            const user = generateUniqueUsername();

            if (dice < 0.15) {
                appendMessage(user, "", 'join');
            } else {
                let category = 'common';
                const typeDice = Math.random();
                
                // Représentation équilibrée des 6 canaux de contenu
                if (typeDice < 0.35) category = 'common';
                else if (typeDice < 0.55) category = 'hype';
                else if (typeDice < 0.70) category = 'questions';
                else if (typeDice < 0.82) category = 'slang';
                else if (typeDice < 0.92) category = 'offtopic_life';
                else category = 'troll_light';

                const pool = commentsDb[category];
                const text = pool[Math.floor(Math.random() * pool.length)];
                appendMessage(user, text, category);

                if (category === 'hype' || Math.random() < 0.3) {
                    totalLikes += Math.floor(Math.random() * 2) + 1;
                    likeDisplaySpan.innerText = totalLikes;
                    totalLikesSpan.innerText = totalLikes;
                    triggerFloatingHeart();
                }
            }
        }

        async function initCamera(facing) {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: false });
                video.srcObject = currentStream;
            } catch (e) {
                console.warn("Caméra indisponible ou refusée.");
            }
        }

        document.getElementById('explicitStartBtn').addEventListener('click', async () => {
            document.getElementById('appStartOverlay').remove();
            await initCamera('user');
            setInterval(runSimulationTick, 2400);
            setInterval(() => {
                viewerCount += Math.floor(Math.random() * 5) - 2;
                viewerSpan.innerText = Math.max(10, viewerCount);
            }, 8000);
        });

        document.getElementById('switchCameraBtn').addEventListener('click', async () => {
            currentFacing = currentFacing === 'user' ? 'environment' : 'user';
            await initCamera(currentFacing);
        });

        document.getElementById('sendLikeBtn').addEventListener('click', () => {
            totalLikes++;
            likeDisplaySpan.innerText = totalLikes;
            totalLikesSpan.innerText = totalLikes;
            triggerFloatingHeart();
        });

        document.getElementById('sendMsgBtn').addEventListener('click', executeUserMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeUserMessage(); });

        function executeUserMessage() {
            const txt = chatInput.value.trim();
            if(!txt) return;
            appendMessage("Vous", txt, 'my');
            chatInput.value = "";
        }
    })();
</script>
</body>
</html>
