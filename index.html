<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Social - Simulation Pro (Moteur V0.3.2.16 SAFE - Unifié)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y;
        }
        .live-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            max-width: 1400px;
            margin: 0 auto;
            background: #000;
            position: relative;
        }
        @media (min-width: 992px) {
            .live-container {
                flex-direction: row;
            }
        }

        /* --- SYSTÈME DE THÉMATISATION DYNAMIQUE (LiveSkin Mapping) --- */
        :root {
            --primary-color: #00bcd4;
            --secondary-color: #e91e63;
            --panel-opacity: 0.42;
            --panel-radius: 12px;
            --button-radius: 999px;
            --gradient-start: #0a192f;
            --gradient-end: #020c1b;
        }

        /* --- ZONE APPAREIL / APERÇU LIVE --- */
        .video-area {
            position: relative;
            background: #111;
            flex: 2;
            min-height: 48vh;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        @media (min-width: 992px) {
            .video-area {
                flex: 1.4;
                height: 100vh;
            }
        }
        .camera-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            transform: scaleX(-1);
        }

        /* --- GRAPHIC OVERLAY CONTENU HUD --- */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            padding: max(10px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom)) 12px;
        }
        .hud-overlay * {
            pointer-events: auto;
        }

        /* LIVE HEADER */
        .hud-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .streamer-pill {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.45);
            padding: 4px 10px 4px 4px;
            border-radius: 999px;
            max-width: 60%;
            backdrop-filter: blur(4px);
        }
        .streamer-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-color);
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 13px;
        }
        .streamer-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .streamer-name {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .streamer-status {
            font-size: 10px;
            color: rgba(255,255,255,0.75);
        }
        .header-badges {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-live {
            background: #ff1744;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 5px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* VIEWER COUNTER (Fidélité Dart Strict) */
        .badge-viewers {
            background: rgba(0, 0, 0, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.25); /* Mis à jour dynamiquement avec opacité 0.55 en JS */
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* COMMENT FEED CONTAINER (Fidélité Alignement et Largeur Canonique) */
        .hud-chat-container {
            position: absolute;
            bottom: 78px;
            left: 12px;
            width: 320px;
            max-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 6px;
            overflow: hidden;
            pointer-events: none;
        }
        
        /* COMMENT BUBBLE (Fidélité Absolue Dart) */
        .chat-bubble {
            background: rgba(0, 0, 0, calc(var(--panel-opacity) * 0.82));
            border-radius: var(--panel-radius);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px 10px;
            font-size: 13px;
            line-height: 1.4;
            color: #fff;
            max-width: 100%;
            word-wrap: break-word;
            animation: slideUp 0.18s ease-out forwards;
            pointer-events: auto;
        }
        .chat-bubble-name {
            font-weight: bold;
            color: var(--primary-color);
            margin-right: 6px;
            display: inline;
        }
        .chat-bubble-msg {
            display: inline;
            white-space: normal;
        }

        /* Variations de bordures issues du switch-case Dart */
        .bubble-type-question { border-color: rgba(255, 193, 7, 0.35) !important; }
        .bubble-type-troll, .bubble-type-slang { border-color: rgba(255, 171, 64, 0.35) !important; }
        .bubble-type-common, .bubble-type-offtopic { border-color: rgba(255, 255, 255, 0.35) !important; }
        /* Les types hype/reaction/gift prennent var(--primary-color) avec opacité via JS */

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ACTION BAR HUD */
        .hud-bottom-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .hud-input-fake {
            flex: 1;
            height: 44px;
            background: rgba(0, 0, 0, var(--panel-opacity));
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: var(--button-radius);
            padding: 0 14px;
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .action-circle-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.45);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .action-circle-btn:active {
            transform: scale(0.9);
        }

        /* --- ZONE PANNEAU CONTROL & MANAGEMENT --- */
        .control-panel {
            flex: 1;
            background: #141416;
            border-top: 1px solid #232326;
            display: flex;
            flex-direction: column;
            height: 52vh;
        }
        @media (min-width: 992px) {
            .control-panel {
                height: 100vh;
                border-top: none;
                border-left: 1px solid #232326;
            }
        }
        .panel-tabs {
            display: flex;
            background: #1c1c1e;
            border-bottom: 1px solid #232326;
        }
        .tab-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            color: #8e8e93;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            background: rgba(255,255,255,0.02);
        }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }

        /* FORMULAIRES & CONTROLES */
        .setting-row {
            margin-bottom: 16px;
        }
        .setting-row label {
            display: block;
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .input-text, select {
            width: 100%;
            background: #1c1c1e;
            border: 1px solid #232326;
            border-radius: 6px;
            padding: 10px 12px;
            color: #fff;
            font-size: 14px;
        }
        .input-text:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 10px;
        }
        .skin-card {
            background: #1c1c1e;
            border: 2px solid #232326;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }
        .skin-card.active {
            border-color: var(--primary-color);
            background: rgba(0, 188, 212, 0.05);
        }
        .skin-preview-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin: 0 auto 8px auto;
        }

        /* ENGINE STATUS CARDS */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .metric-box {
            background: #1c1c1e;
            border: 1px solid #232326;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .metric-val {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-top: 4px;
        }
        .metric-label {
            font-size: 11px;
            color: #8e8e93;
        }

        /* BACKOFFICE LIVE CHAT MONITOR */
        .backoffice-chat-log {
            background: #0b0b0c;
            border: 1px solid #232326;
            border-radius: 8px;
            height: 180px;
            overflow-y: auto;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        .log-line {
            margin-bottom: 4px;
            color: #a1a1aa;
        }
        .log-line .tag {
            color: var(--primary-color);
            font-weight: bold;
        }

        /* COEUR PARTICLE FLOATING EFFECT */
        .heart-particle {
            position: absolute;
            bottom: 80px;
            right: 20px;
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.2) rotate(15deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="live-container">
    
    <div class="video-area">
        <video class="camera-preview" id="webcamSrc" autoplay playsinline muted></video>
        <div id="particleSpace"></div>

        <div class="hud-overlay">
            <div class="hud-header">
                <div class="streamer-pill">
                    <div class="streamer-avatar" id="hudAvatar">U</div>
                    <div class="streamer-info">
                        <span class="streamer-name" id="hudUsername">user_lab</span>
                        <span class="streamer-status" id="hudLocation">En direct</span>
                    </div>
                </div>
                
                <div class="header-badges">
                    <span class="badge-live">Direct</span>
                    <div class="badge-viewers" id="hudViewerBadge">
                        <i class="fas fa-eye"></i> <span id="viewerCount">0</span>
                    </div>
                </div>
            </div>

            <div class="hud-chat-container" id="hudChatFeed"></div>

            <div class="hud-bottom-actions">
                <div class="hud-input-fake">Écrire un commentaire...</div>
                <button class="action-circle-btn" id="sendLikeBtn"><i class="fas fa-heart"></i></button>
                <button class="action-circle-btn" id="sendGiftBtn" style="color: var(--secondary-color);"><i class="fas fa-gift"></i></button>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <nav class="panel-tabs">
            <button class="tab-btn active" data-target="tabConfig">Configuration</button>
            <button class="tab-btn" data-target="tabEngine">Moteur de flux</button>
        </nav>

        <div class="panel-content">
            <div class="tab-pane active" id="tabConfig">
                <div class="setting-row">
                    <label>Nom d'utilisateur (Simulé)</label>
                    <input type="text" class="input-text" id="cfgUsername" value="creator_lab">
                </div>
                <div class="setting-row">
                    <label>Label Localisation / Statut</label>
                    <input type="text" class="input-text" id="cfgLocation" value="Studio de test">
                </div>
                <div class="setting-row">
                    <label>Caméra Matérielle</label>
                    <select id="cfgCamera">
                        <option value="user">Caméra Avant (Miroir)</option>
                        <option value="environment">Caméra Arrière</option>
                        <option value="none">Aucune (Dégradé de Fond)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Sélection du Skin (Thématisation)</label>
                    <div class="skin-grid">
                        <div class="skin-card active" data-skin="blueSocial">
                            <div class="skin-preview-dot" style="background: #00bcd4;"></div>
                            <span style="font-size: 11px;">BlueSocial</span>
                        </div>
                        <div class="skin-card" data-skin="redVideo">
                            <div class="skin-preview-dot" style="background: #ff1744;"></div>
                            <span style="font-size: 11px;">RedVideo</span>
                        </div>
                        <div class="skin-card" data-skin="debug">
                            <div class="skin-preview-dot" style="background: #00ff00;"></div>
                            <span style="font-size: 11px;">Debug</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane" id="tabEngine">
                <div class="metrics-grid">
                    <div class="metric-box">
                        <div class="metric-label">Spectateurs</div>
                        <div class="metric-val" id="totalViewersRealtime">0</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">Mentions J'aime</div>
                        <div class="metric-val" id="totalLikesRealtime">0</div>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Injection Manuelle de Message (Test)</label>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" class="input-text" id="chatInput" placeholder="Tapez un message simulé...">
                        <button id="sendMsgBtn" style="padding: 0 14px; background: var(--primary-color); border: none; border-radius: 6px; color:#000; font-weight: bold; cursor:pointer;">Injecter</button>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Journal d'activité Console Backoffice</label>
                    <div class="backoffice-chat-log" id="backofficeLog"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    (function() {
        /* --- SYSTÈME DE DONNÉES ET CONFIGURATION DES SKINS --- */
        const SKIN_REPOSITORY = {
            'blueSocial': {
                primary: '#00bcd4', secondary: '#e91e63',
                bgStart: '#0a192f', bgEnd: '#020c1b',
                opacity: 0.42, panelRadius: '12px', buttonRadius: '999px'
            },
            'redVideo': {
                primary: '#ff1744', secondary: '#ffffff',
                bgStart: '#1a0508', bgEnd: '#050001',
                opacity: 0.60, panelRadius: '8px', buttonRadius: '8px'
            },
            'debug': {
                primary: '#00ff00', secondary: '#ff00ff',
                bgStart: '#000000', bgEnd: '#111111',
                opacity: 0.75, panelRadius: '0px', buttonRadius: '0px'
            }
        };

        let currentSkinId = 'blueSocial';
        let viewerCount = 485;
        let totalLikes = 0;
        let currentFacing = 'user';
        let localStream = null;
        let activeBubblesCount = 0; // Suivi pour seuil strict de 9 messages

        /* --- SYSTÈME DE DISTRIBUTION ET TYPES DE MESSAGES (Dart Type Sync) --- */
        const COMMENT_TYPES = ['common', 'question', 'hype', 'reaction', 'giftReaction', 'lightTroll', 'offtopicLife', 'slang'];
        const MOCK_USERNAMES = ['Alex_92', 'Lara_Croft', 'Dorian_G', 'Kev_Web', 'Sophie.Tech', 'AlphaRoméo', 'User9482', 'GamerPro', 'Chloee_Star', 'Max_Power'];
        const MOCK_PHRASES = [
            "Le live est vraiment super sympa ce soir !",
            "Tu utilises quel type de caméra pour ce rendu ?",
            "Incroyable cette démo ! Let's go !! 🔥",
            "Est-ce que le projet est open-source ?",
            "Wesh ça va ou quoi l'équipe ?",
            "Je viens de débarquer, ça parle de quoi ?",
            "Mon chat vient de renverser mon café à l'instant... 😹",
            "C'est propre, rien à redire sur le cadrage.",
            "Grosse ambiance ici !"
        ];

        /* --- INITIALISATION DE L'INTERFACE --- */
        document.addEventListener('DOMContentLoaded', () => {
            setupTabs();
            setupConfigListeners();
            applySkin(currentSkinId);
            syncProfileHUD();
            initCamera(currentFacing);

            // Boucles d'animation autonomes
            startSimulationEngine();
        });

        /* --- NAVIGATION DES ONGLETS CONTROLES --- */
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.target).classList.add('active');
                });
            });
        }

        /* --- ÉCOUTEURS DES CHANGEMENTS DE CONFIGURATION --- */
        function setupConfigListeners() {
            document.getElementById('cfgUsername').addEventListener('input', syncProfileHUD);
            document.getElementById('cfgLocation').addEventListener('input', syncProfileHUD);
            
            document.getElementById('cfgCamera').addEventListener('change', (e) => {
                currentFacing = e.target.value;
                initCamera(currentFacing);
            });

            const cards = document.querySelectorAll('.skin-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    cards.forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    currentSkinId = card.dataset.skin;
                    applySkin(currentSkinId);
                });
            });
        }

        function syncProfileHUD() {
            const username = document.getElementById('cfgUsername').value.trim() || 'user_lab';
            const location = document.getElementById('cfgLocation').value.trim() || 'En direct';
            
            document.getElementById('hudUsername').innerText = username;
            document.getElementById('hudLocation').innerText = location;
            document.getElementById('hudAvatar').innerText = username.charAt(0).toUpperCase();
        }

        /* --- TRANSFORMATION DYNAMIQUE DE PEAU (CSS Injector & Dart Opacity Rules) --- */
        function applySkin(skinId) {
            const skin = SKIN_REPOSITORY[skinId] || SKIN_REPOSITORY['blueSocial'];
            const root = document.documentElement;

            root.style.setProperty('--primary-color', skin.primary);
            root.style.setProperty('--secondary-color', skin.secondary);
            root.style.setProperty('--gradient-start', skin.bgStart);
            root.style.setProperty('--gradient-end', skin.bgEnd);
            root.style.setProperty('--panel-opacity', skin.opacity);
            root.style.setProperty('--panel-radius', skin.panelRadius);
            root.style.setProperty('--button-radius', skin.buttonRadius);

            // Couplage d'opacité stricte selon la configuration ViewerCounter (.withOpacity(0.55))
            document.getElementById('hudViewerBadge').style.borderColor = `${skin.primary}8C`;
            
            // Notification visuelle dans le backoffice
            appendLogSystem(`Skin permuté avec succès : [${skinId}]`);
        }

        /* --- PREVIEW CAMÉRA MATÉRIELLE (CameraPreviewLayer) --- */
        async function initCamera(facing) {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            const videoElement = document.getElementById('webcamSrc');
            if (facing === 'none') {
                videoElement.style.display = 'none';
                videoElement.srcObject = null;
                return;
            }

            videoElement.style.display = 'block';
            videoElement.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facing },
                    audio: false
                });
                videoElement.srcObject = localStream;
            } catch (err) {
                console.warn("Accès caméra refusé ou indisponible : ", err);
                videoElement.style.display = 'none'; // Repli automatique vers le dégradé CSS
            }
        }

        /* --- MOTEUR APPORT CHAT CONSTANT & SUPPRESSION STRICTE (CommentFeed Limiter) --- */
        function appendMessage(username, message, type = 'common') {
            const feedContainer = document.getElementById('hudChatFeed');
            
            const bubble = document.createElement('div');
            // Cartographie structurelle des classes css de bordure issues du switch Dart
            let dartTypeClass = 'bubble-type-common';
            if (type === 'question') dartTypeClass = 'bubble-type-question';
            else if (type === 'lightTroll') dartTypeClass = 'bubble-type-troll';
            else if (type === 'slang') dartTypeClass = 'bubble-type-slang';
            else if (type === 'offtopicLife') dartTypeClass = 'bubble-type-offtopic';
            
            bubble.className = `chat-bubble ${dartTypeClass}`;

            // Traitement spécifique inline pour injecter skin.primary sur les types d'engagement
            if (['hype', 'reaction', 'giftReaction'].includes(type)) {
                bubble.style.borderColor = `var(--primary-color)`;
            }

            // Injection du RichText Structure
            bubble.innerHTML = `
                <div class="chat-bubble-name">${username}</div>
                <div class="chat-bubble-msg">${message}</div>
            `;

            feedContainer.appendChild(bubble);
            activeBubblesCount++;

            /* --- RÈGLE D'OR DART CONFORME : MAX 9 BULLES DANS LE DOM --- */
            while (activeBubblesCount > 9) {
                const oldestBubble = feedContainer.firstElementChild;
                if (oldestBubble) {
                    feedContainer.removeChild(oldestBubble);
                    activeBubblesCount--;
                }
            }

            // Synchro simultanée dans la console technique
            appendLogBackoffice(username, message, type);
        }

        /* --- LOGIQUE DE SIMULATION AUTONOME (Génération d'audience) --- */
        function startSimulationEngine() {
            // Mise à jour de l'affichage initial du compteur
            document.getElementById('viewerCount').innerText = viewerCount;
            document.getElementById('totalViewersRealtime').innerText = viewerCount;

            // Fluctuation naturelle d'audience
            setInterval(() => {
                const diff = Math.floor(Math.random() * 5) - 2;
                viewerCount = Math.max(12, viewerCount + diff);
                document.getElementById('viewerCount').innerText = viewerCount;
                document.getElementById('totalViewersRealtime').innerText = viewerCount;
            }, 5000);

            // Génération automatisée régulière de commentaires simulés
            setInterval(() => {
                const randomUser = MOCK_USERNAMES[Math.floor(Math.random() * MOCK_USERNAMES.length)];
                const randomMsg = MOCK_PHRASES[Math.floor(Math.random() * MOCK_PHRASES.length)];
                const randomType = COMMENT_TYPES[Math.floor(Math.random() * COMMENT_TYPES.length)];
                
                appendMessage(randomUser, randomMsg, randomType);
            }, 3800);
        }

        /* --- CONSOLE LOGGERS (Backoffice Monitor) --- */
        function appendLogBackoffice(user, msg, type) {
            const logBox = document.getElementById('backofficeLog');
            const entry = document.createElement('div');
            entry.className = 'log-line';
            entry.innerHTML = `[${type.toUpperCase()}] <span class="tag">${user}:</span> ${msg}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function appendLogSystem(text) {
            const logBox = document.getElementById('backofficeLog');
            const entry = document.createElement('div');
            entry.className = 'log-line';
            entry.style.color = '#5cb85c';
            entry.innerHTML = `[SYS] <span>${text}</span>`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        /* --- INTERACTION BOUTONS ET EFFETS VISUELS --- */
        document.getElementById('sendLikeBtn').addEventListener('click', () => {
            totalLikes++;
            document.getElementById('totalLikesRealtime').innerText = totalLikes;
            
            // Particule de coeur flottante
            const particleSpace = document.getElementById('particleSpace');
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = '❤️';
            heart.style.left = `${Math.floor(Math.random() * 60) + 280}px`;
            particleSpace.appendChild(heart);
            
            setTimeout(() => heart.remove(), 800);
            
            appendMessage("Moi", "a aimé le live ! 💖", "hype");
        });

        document.getElementById('sendGiftBtn').addEventListener('click', () => {
            appendMessage("Moi", "a envoyé un cadeau ! 🎁", "giftReaction");
        });

        document.getElementById('sendMsgBtn').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const val = input.value.trim();
            if (!val) return;
            
            appendMessage("Moi", val, "common");
            input.value = '';
        });

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendMsgBtn').click();
            }
        });
    })();
</script>

</body>
</html>
