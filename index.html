<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, max-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Simulator Lab - Core Overlay</title>
    <style>
        /* --- DESIGN SYSTEM & CSS TOKENS (Fidélité LiveSkin) --- */
        :root {
            /* Valeurs par défaut du skin (S'aligne sur SkinId.blueSocial) */
            --primary-color: #00bcd4;
            --secondary-color: #e91e63;
            --background-start: #0a192f;
            --background-end: #020c1b;
            --panel-opacity: 0.42;
            --panel-radius: 12px;
            --button-radius: 999px;
            
            /* Couleurs fixes du moteur de commentaires */
            --border-question: #ffc107;
            --border-troll-slang: #ffab40;
            --border-ambient: #ffffff;
        }

        /* --- LAYOUT & AUTO WINDOW SIZE (Simulé en conteneur smartphone) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Le conteneur reproduit les dimensions d'un écran de smartphone moderne */
        .phone-canvas {
            position: relative;
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 892px;
            background: linear-gradient(135deg, var(--background-start), var(--background-end));
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(0,0,0,0.8);
            border-radius: 0;
        }

        @media (min-width: 450px) {
            .phone-canvas {
                border-radius: 36px;
                height: 85vh;
                border: 8px solid #2c2c2c;
            }
        }

        /* --- FLUX CAMÉRA ARRIÈRE-PLAN --- */
        .camera-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transform: scaleX(-1); /* Effet miroir par défaut pour la caméra avant */
        }

        /* --- COUCHE OVERLAY CONTENU HUD (Z-INDEX: 2) --- */
        .live-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* SAFE AREA PROTECTION FOR NOTCH / SYSTEM BARS */
            padding-top: max(8px, env(safe-area-inset-top));
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

        /* --- LIVE HEADER COMPONENT --- */
        .live-header {
            padding: 8px 12px 0 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header-main-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #000000;
            font-size: 14px;
            background-size: cover;
            background-position: center;
        }

        .creator-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .username-text {
            color: #ffffff;
            font-size: 14px;
            font-weight: 900;
            white-space: nowrap;
            overflow: text-overflow;
            text-overflow: ellipsis;
            text-shadow: 0 2px 8px rgba(0,0,0,0.87);
        }

        .location-text {
            color: rgba(255, 255, 255, 0.72);
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: text-overflow;
            text-overflow: ellipsis;
            text-shadow: 0 2px 8px rgba(0,0,0,0.87);
        }

        .live-badge {
            background-color: #E9002D;
            color: #ffffff;
            font-size: 11px;
            font-weight: 900;
            padding: 6px 9px;
            border-radius: 999px;
            letter-spacing: 0.4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.54);
        }

        /* VIEWER COUNTER COMPONENT */
        .viewer-counter {
            background-color: rgba(0, 0, 0, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.25); /* Dynamisé en JS via var(--primary-color) */
            padding: 6px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
        }

        .viewer-icon {
            width: 16px;
            height: 16px;
            fill: var(--primary-color);
        }

        .close-button {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .camera-local-pill {
            align-self: flex-start;
            background-color: rgba(0, 0, 0, 0.42);
            border: 1px solid rgba(255, 255, 255, 0.2); /* Dynamisé en JS */
            padding: 8px 12px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
        }

        /* --- COMMENT FEED COMPONENT --- */
        .comment-feed {
            position: absolute;
            bottom: 78px;
            left: 12px;
            width: 320px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 6px;
            pointer-events: none;
        }

        .comment-bubble {
            background-color: rgba(0, 0, 0, calc(var(--panel-opacity) * 0.82));
            border-radius: var(--panel-radius);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px 10px;
            font-size: 13px;
            color: #ffffff;
            max-width: 100%;
            word-wrap: break-word;
            animation: fadeInBubble 0.2s ease-out forwards;
        }

        .comment-username {
            font-weight: bold;
            color: var(--primary-color);
            margin-right: 6px;
        }

        @keyframes fadeInBubble {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modifications de bordure selon le type (Fidélité absolue au Dart) */
        .bubble-question { border-color: rgba(255, 193, 7, 0.35); }
        .bubble-hype, .bubble-reaction, .bubble-gift { border-color: rgba(255, 255, 255, 0.35); } /* Changé dynamiquement par le script selon skin.primary */
        .bubble-troll, .bubble-slang { border-color: rgba(255, 171, 64, 0.35); }
        .bubble-common, .bubble-offtopic { border-color: rgba(255, 255, 255, 0.35); }

        /* --- FAKE BOTTOM BAR COMPONENT --- */
        .fake-bottom-bar {
            padding: 0 12px 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fake-comment-input {
            flex: 1;
            height: 44px;
            background-color: rgba(0, 0, 0, var(--panel-opacity));
            border-radius: var(--button-radius);
            border: 1px solid rgba(255, 255, 255, 0.16);
            padding: 0 14px;
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.62);
            font-size: 14px;
        }

        .round-action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.42);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .round-action-btn svg {
            width: 22px;
            height: 22px;
        }
    </style>
</head>
<body>

    <div class="phone-canvas" id="appCanvas">
        <video class="camera-layer" id="cameraVideo" autoplay playsinline muted></video>

        <div class="live-overlay">
            
            <header class="live-header" id="liveHeader">
                <div class="header-main-row">
                    <div class="profile-avatar" id="profileAvatar">?</div>
                    <div class="creator-info">
                        <span class="username-text" id="usernameText">creator_lab</span>
                        <span class="location-text" id="locationText">En direct</span>
                    </div>
                    <div class="live-badge" id="liveBadge">DIRECT</div>
                    
                    <div class="viewer-counter" id="viewerCounter">
                        <svg class="viewer-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        <span id="viewerLabel">0</span>
                    </div>

                    <button class="close-button" onclick="handleClose()">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="camera-local-pill" id="cameraLocalPill" style="display: none;">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                    <span id="cameraLocalLabel">Caméra locale</span>
                </div>
            </header>

            <div class="comment-feed" id="commentFeed"></div>

            <footer class="fake-bottom-bar">
                <div class="fake-comment-input" id="fakeCommentPlaceholder">
                    Écrire un commentaire...
                </div>
                <button class="round-action-btn" id="likeBtn" onclick="triggerLike()">
                    <svg viewBox="0 0 24 24" fill="var(--primary-color)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <button class="round-action-btn" id="giftBtn" onclick="triggerGift()">
                    <svg viewBox="0 0 24 24" fill="var(--secondary-color)"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83l1.41 1.41L12 8.41l3.59 3.83L17 10.83 14.92 8H20v6z"/></svg>
                </button>
            </footer>

        </div>
    </div>

    <script>
        /* --- CONFIGURATION ET ÉTAT DE SESSION (SessionConfig & LiveSkin) --- */
        const SKINS = {
            'blueSocial': {
                primary: '#00bcd4', secondary: '#e91e63',
                bgStart: '#0a192f', bgEnd: '#020c1b',
                opacity: 0.42, panelRadius: '12px', buttonRadius: '999px'
            },
            'redVideo': {
                primary: '#ff1744', secondary: '#ffffff',
                bgStart: '#1a0508', bgEnd: '#050001',
                opacity: 0.60, panelRadius: '8px', buttonRadius: '8px'
            },
            'debug': {
                primary: '#00ff00', secondary: '#ff00ff',
                bgStart: '#000000', bgEnd: '#111111',
                opacity: 0.75, panelRadius: '0px', buttonRadius: '0px'
            }
        };

        // Mutation de l'état global
        let currentConfig = {
            skinId: 'blueSocial',
            localUsername: 'creator_lab',
            locationLabel: '',
            cameraEnabled: true,
            viewerCount: 524
        };

        /* --- MOTEUR DE RENDU DU SKIN (CSS Variables Injector) --- */
        function applySkin(skinId) {
            const skin = SKINS[skinId] || SKINS['blueSocial'];
            const root = document.documentElement;
            
            root.style.setProperty('--primary-color', skin.primary);
            root.style.setProperty('--secondary-color', skin.secondary);
            root.style.setProperty('--background-start', skin.bgStart);
            root.style.setProperty('--background-end', skin.bgEnd);
            root.style.setProperty('--panel-opacity', skin.opacity);
            root.style.setProperty('--panel-radius', skin.panelRadius);
            root.style.setProperty('--button-radius', skin.buttonRadius);

            // Ajustement des contours dynamiques basés sur la couleur primaire
            document.getElementById('viewerCounter').style.borderColor = `${skin.primary}8C`; // Opacity 0.55
            document.getElementById('cameraLocalPill').style.borderColor = `${skin.primary}73`; // Opacity 0.45
        }

        /* --- INITIALISATION DE L'INTERFACE --- */
        function initSession() {
            applySkin(currentConfig.skinId);
            
            document.getElementById('usernameText').innerText = currentConfig.localUsername;
            document.getElementById('locationText').innerText = currentConfig.locationLabel.trim() || "Localisation...";
            document.getElementById('viewerLabel').innerText = currentConfig.viewerCount;

            // Affichage de la pilule debug si skinId == 'debug'
            if (currentConfig.skinId === 'debug') {
                document.getElementById('cameraLocalPill').style.display = 'flex';
            }

            if (currentConfig.cameraEnabled) {
                initCamera();
            }
        }

        /* --- COUCHE NATIVE APPAREIL PHOTO / CAMÉRA (CameraPreviewLayer) --- */
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                const videoElement = document.getElementById('cameraVideo');
                videoElement.srcObject = stream;
            } catch (error) {
                console.warn("Caméra indisponible ou refusée :", error);
                // Si échec, le fond dégradé CSS reste visible automatiquement
            }
        }

        /* --- GESTION DU CHAT AVEC SEUIL STRICT DE 9 MESSAGES (CommentFeed) --- */
        const commentFeedContainer = document.getElementById('commentFeed');
        let activeCommentsCount = 0;

        function addFakeComment(username, message, type = 'common') {
            // Création de la bulle
            const bubble = document.createElement('div');
            bubble.className = `comment-bubble bubble-${type}`;
            
            // Si le type exige la couleur primaire du skin, on l'injecte à la volée sur la bordure
            if (['hype', 'reaction', 'gift'].includes(type)) {
                bubble.style.borderColor = `var(--primary-color)`;
            }

            // Construction du RichText
            bubble.innerHTML = `<span class="comment-username">${username}</span>${message}`;
            
            // Injection dans le container
            commentFeedContainer.appendChild(bubble);
            activeCommentsCount++;

            // Limitation absolue à 9 éléments (Règle d'or Dart préservée)
            while (activeCommentsCount > 9) {
                const firstChild = commentFeedContainer.firstElementChild;
                if (firstChild) {
                    commentFeedContainer.removeChild(firstChild);
                    activeCommentsCount--;
                }
            }
        }

        /* --- FONCTIONS DES BOUTONS DE L'INTERFACE --- */
        function triggerLike() {
            addFakeComment("Moi", "a cliqué sur J'aime ! 💖", "hype");
        }

        function triggerGift() {
            addFakeComment("Moi", "a envoyé un cadeau ! 🎁", "gift");
        }

        function handleClose() {
            alert("Fermeture de la session de simulation.");
        }

        // Lancement immédiat au chargement
        window.onload = initSession;
    </script>
</body>
</html>
